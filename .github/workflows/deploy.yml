# Builds -> pushes to GHCR -> syncs compose/Caddyfile to the VPS -> compose up ->
# reloads the shared Caddy. From the robertmckinnon.au handbook templates/deploy.yml.
#
# Repo secrets required: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PORT (optional).
# GITHUB_TOKEN is built in (used to push to GHCR).

name: Deploy
on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy-${{ github.repository }}
  cancel-in-progress: false

env:
  STACK_DIR: /opt/multistream        # Option B — independent stack

jobs:
  quality:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Compute image name
        id: image
        shell: bash
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          repo="$(basename '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/${repo}" >> "$GITHUB_OUTPUT"
          echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.sha }}

      - name: Sync deploy artifacts to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "deploy/docker-compose.yml,deploy/Caddyfile"
          target: ${{ env.STACK_DIR }}
          strip_components: 1
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -eu
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
            cd ${{ env.STACK_DIR }}
            docker compose pull --ignore-buildable
            docker compose up -d

            # Splice this tool's Caddy block into the single shared Caddyfile,
            # replaced-or-appended between per-tool markers (idempotent).
            SHARED=/opt/workout/Caddyfile
            if [ "${{ env.STACK_DIR }}" != "/opt/workout" ] && [ -f "${{ env.STACK_DIR }}/Caddyfile" ]; then
              TOOL="$(basename '${{ env.STACK_DIR }}')"
              S="# >>> ${TOOL} (managed by deploy) >>>"
              E="# <<< ${TOOL} <<<"
              TMP="$(mktemp)"
              awk -v s="$S" -v e="$E" '$0==s{skip=1;next} $0==e{skip=0;next} skip!=1{print}' "$SHARED" > "$TMP"
              { echo "$S"; cat "${{ env.STACK_DIR }}/Caddyfile"; echo "$E"; } >> "$TMP"
              # Preserve the bind-mounted file's inode so Caddy sees the update.
              cat "$TMP" > "$SHARED"
              rm -f "$TMP"
            fi

            # Validate + reload the shared edge (Caddy runs in /opt/workout):
            (cd /opt/workout \
              && docker compose exec -T caddy caddy validate --config /etc/caddy/Caddyfile \
              && docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile)
            docker image prune -f
