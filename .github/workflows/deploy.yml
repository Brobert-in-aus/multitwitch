# Builds -> pushes to GHCR -> syncs compose to the VPS -> compose up.
# Shared Caddy routing is owned by robertmckinnon-au-hosting.
#
# Repo secrets required: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PORT (optional).
# GITHUB_TOKEN is built in (used to push to GHCR).

name: Deploy
on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy-${{ github.repository }}
  cancel-in-progress: false

env:
  STACK_DIR: /opt/multistream        # Option B - independent stack

jobs:
  quality:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Compute image name
        id: image
        shell: bash
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          repo="$(basename '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/${repo}" >> "$GITHUB_OUTPUT"
          echo "hlsproxy_name=ghcr.io/${owner}/${repo}-hlsproxy" >> "$GITHUB_OUTPUT"
          echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.sha }}

      - name: Build and push hlsproxy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.hlsproxy
          push: true
          tags: |
            ${{ steps.image.outputs.hlsproxy_name }}:latest
            ${{ steps.image.outputs.hlsproxy_name }}:${{ steps.image.outputs.sha }}

      - name: Sync deploy artifacts to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "deploy/docker-compose.yml"
          target: ${{ env.STACK_DIR }}
          strip_components: 1
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -eu
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
            cd ${{ env.STACK_DIR }}
            docker compose pull --ignore-buildable
            docker compose up -d
            docker image prune -f
