name: Test

on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: false   # no go.sum -- hlsproxy has zero external dependencies

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Python unit tests
        run: python -m unittest discover -s tests -v

      - name: Check Python syntax
        run: python -m compileall -q multitwitch runapp.py

      - name: Check JavaScript syntax
        run: node --check multitwitch/static/js/multitwitch.js

      - name: Run JavaScript unit tests
        run: node --test tests/*.test.js

      - name: Vet and test hlsproxy (Go)
        run: |
          go vet ./...
          go test ./...

      - name: Build hlsproxy
        run: go build -o /tmp/hlsproxy ./cmd/hlsproxy

      - name: Validate production Compose configuration
        run: docker compose -f deploy/docker-compose.yml config -q
